slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    map_update_interval: 2.0
    resolution: 0.05
    # Keep SLAM compute bounded to avoid scan backlog and stale-timestamp TF lookups.
    max_laser_range: 8.0
    minimum_time_interval: 0.25
    transform_publish_period: 0.02
    tf_buffer_duration: 180.0
    use_scan_matching: true
    use_scan_barycenter: true
    throttle_scans: 2

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
