controller_manager:
  ros__parameters:
    update_rate: 50
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: true

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]
    wheel_separation: 0.195
    wheel_radius: 0.03354
    publish_rate: 50.0
    cmd_vel_timeout: 0.25
    use_stamped_vel: false
    # ros2_control hardware plugin is currently a stub and does not read real encoders;
    # keep this TF disabled to avoid synthetic odom->base_link in mapping/localization.
    enable_odom_tf: false
    base_frame_id: base_link
    odom_frame_id: odom
