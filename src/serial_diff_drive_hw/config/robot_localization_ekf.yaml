robot_localization_filter:
  ros__parameters:
    frequency: 25.0
    sensor_timeout: 0.2
    two_d_mode: true
    debug: false
    publish_tf: true
    print_diagnostics: false
    use_control: false
    reset_on_time_jump: true
    transform_time_offset: 0.0
    transform_timeout: 0.0

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odom remains a raw source.
    odom0: /odom_raw
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_config: [
      true, true, false,
      false, false, false,
      true, false, false,
      false, false, true,
      false, false, false
    ]

    # IMU orientation only (remapped from yb_a471_driver into ROS frame).
    imu0: /imu/orientation
    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_config: [
      false, false, false,
      false, false, true,
      false, false, false,
      false, false, false,
      false, false, false
    ]

    # IMU angular velocity + linear acceleration.
    imu1: /imu/data_raw
    imu1_queue_size: 10
    imu1_differential: false
    imu1_relative: false
    imu1_remove_gravitational_acceleration: true
    imu1_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, true,
      true, true, true
    ]
